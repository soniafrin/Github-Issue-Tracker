<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <!-- tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-Awsome  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="">
    <header class="bg-base-100 shadow-sm">
        <div class="navbar flex justify-between w-11/12 mx-auto">
            <div class="flex justify-between items-center gap-2">
                <img class="w-10" src="assets/github-logo.png" alt="">
                <h2>GitHub Issues Tracker</h2>
            </div>
            <div class="flex justify-between gap-3 flex-">
                <div class="flex gap-2 ">
                    <!-- <i class="absolute top-3 opacity-65 left-1 z-1 fa-solid fa-magnifying-glass"></i> -->
                    <input type="text" value="   Search Issues..." placeholder="Search" class="input input-bordered w-24 md:w-auto" />
                </div>
                <!-- button  -->
                <div class="navbar-end">
                    <button class="btn bg-[#4A00FF] text-white"><i class="fa-solid fa-plus"></i>New Issue</button>
                </div>
            </div>
        </div>
    </header>
    <!-- main section  -->
    <main class="bg-base-200 pt-14">
        <!-- toggle container -->
        <section class=" ">
            <div class="flex gap-2 w-10/12 mx-auto bg-base-100 p-6 rounded-lg  shadow-sm">
                    <button onclick="displayAllIssues()" class="btn bg-[#4A00FF] text-white px-9">All</button>
                    <div id="btn-container" class=" flex gap-2">
        
                    </div>
            </div>
            <!-- <div id="open-btn" class="">
                    <button class="btn  bg-white text-gray-500 px-9">open</button>
            </div>
            <div class="">
                    <button class="btn bg-white text-gray-500 px-9">Closed</button>
            </div> -->
        </section>

        <!-- issue container  -->
         <section class="w-10/12 mx-auto mt-4  ">
            <!-- issue count -->
            <div class="flex justify-between bg-base-100  p-6 shadow-sm items-center ">
                <div class="flex gap-2 items-center">
                    <img class="w-10" src="assets/Aperture.png" alt="">
                    <div>
                        <h2>50 Issues</h2>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                <!-- status -->
                <div class="flex gap-4 list-disc">
                    <p><i class="fa-solid fa-circle text-green-700 text-xs"></i> Open</p>
                    <p><i class="fa-solid fa-circle text-purple-700 text-xs"></i> Closed</p>
                </div>
            </div>
            <!-- cards container -->
            <div id="cards-container" class="grid grid-cols-3 gap-3 p-6 shadow-sm">
                <!-- card  -->
                <div class="hidden bg-base-100 p-4 space-y-3 rounded-md border-t-4 border-green-700 shadow-sm">
                    <!-- status  -->
                    <div class="flex justify-between items-center">
                        <img  src="assets/Open-Status.png" alt="">
                        <p class="bg-red-100 rounded-full px-6 py-1 text-red-500 font-medium text-xs">High</p>
                    </div>
                    <!-- titles -->
                    <div class="space-y-3">
                        <h3 class="font-semibold text-[14px]">Fix navigation menu on mobile devices</h3>
                        <p class="text-xs">The navigation menu doesn't collapse properly on mobile devices...</p>
                        <!-- labels -->
                        <div class="flex justify-between items-center ">
                            <p class="bg-red-100 rounded-full px-4 py-1 text-red-500 font-medium border border-red-500 text-xs"><i class="fa-solid fa-bug "></i>BUG</p>
                            <p class="bg-yellow-100 rounded-full px-4 py-1 text-yellow-600 font-medium border border-yellow-600 text-xs"><i class="fa-solid fa-life-ring"></i>Help Wanted</p>
                        </div>
                    </div>
                    <!-- end of card  -->
                    <span class="text-gray-300"><hr></span>
                    <div class="mt-1 space-y-1">
                        <p class="text-gray-400 text-xs">#1 by john_doe</p>
                        <p class="text-gray-400 text-xs">1/15/2024</p>
                    </div>
                </div>
                <!-- loading spinner  -->
                <div id="loading-spinner" class="hidden bg-slate-700 absolute ">
                   <span class="loading loading-ring loading-xl"></span>
               </div>
            </div>

         </section>
    </main>
    <script src="home2.js"></script>
</body>
</html>
